name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  analytics-tests:
    name: Python analytics (pytest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          # Cihazdaki Chaquopy ortamini yansitir: Python 3.12 + pandas 2.1.3
          python-version: "3.12"
      - run: pip install pandas==2.1.3 pytest
      - run: pytest -v

  android-build:
    name: Android build (assembleDebug)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
      - uses: actions/setup-python@v5
        with:
          # Chaquopy'nin derleme sirasinda kullandigi host Python
          python-version: "3.12"
      - uses: gradle/actions/setup-gradle@v4
      - run: chmod +x gradlew && ./gradlew assembleDebug
